name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel Staging Webhook
        env:
          WEBHOOK_URL: ${{ secrets.EASYPANEL_STAGING_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: EASYPANEL_STAGING_WEBHOOK secret is empty or not set."
            exit 1
          fi
          echo "Triggering deployment to Staging..."
          curl -X POST -f "$WEBHOOK_URL"
          echo "Deployment triggered successfully."
