name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=critical
        continue-on-error: false

      - name: Trigger Easypanel Staging Webhook
        env:
          WEBHOOK_URL: ${{ secrets.EASYPANEL_STAGING_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: EASYPANEL_STAGING_WEBHOOK secret is empty or not set."
            exit 1
          fi
          echo "Triggering deployment to Staging..."
          curl -X POST -f "$WEBHOOK_URL"
          echo "Deployment triggered successfully."
