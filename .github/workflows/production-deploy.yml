name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=critical
        continue-on-error: false

      - name: Trigger Easypanel Deploy
        env:
          WEBHOOK_URL: ${{ secrets.EASYPANEL_PRODUCTION_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: EASYPANEL_PRODUCTION_WEBHOOK secret is empty or not set."
            exit 1
          fi
          curl -X POST -f "$WEBHOOK_URL"
          echo "Deployment triggered successfully."
