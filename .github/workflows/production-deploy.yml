name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build and Deploy
        env:
          EASYPANEL_PRODUCTION_WEBHOOK: ${{ secrets.EASYPANEL_PRODUCTION_WEBHOOK }}
        run: node scripts/deploy.mjs production
